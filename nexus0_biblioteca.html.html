impando as mãos displicente. — Você ganha, fica insuportável por uma semana, e eu tenho coisas melhores para vender do que meu próprio orgulho.</p>\n\n    <p class=\"conto\">— Coisas melhores que isso eu duvido que você tenha.</p>\n\n    <p class=\"conto\">Por um segundo — só um segundo, rápido o bastante para qualquer um que não estivesse prestando atenção perder completamente — Hasiel hesitou. Foi quase nada: um piscar mais lento, um músculo do maxilar que se contraiu antes de relaxar de novo. Mas Misha viu. Misha sempre via.</p>\n\n    <p class=\"conto\">— Boa noite, Misha — disse ele, recuperando a compostura rápido demais para ser natural, e já se afastando entre as cadeiras.</p>\n\n    <p class=\"conto\">— Hasiel.</p>\n\n    <p class=\"conto\">Ele não parou.</p>\n\n    <p class=\"conto\">— HASIEL.</p>\n\n    <p class=\"conto\">Ele parou — mas não se virou.</p>\n\n    <p class=\"conto\">— Um dia você vai ter que jogar contra mim de verdade.</p>\n\n    <p class=\"conto\">— Um dia, talvez. — E, com isso, desapareceu pela saída lateral do Teatro, deixando Misha parada ali, vermelha de uma fúria que ela própria não sabia explicar inteiramente, enquanto metade da platéia ainda gravava cada segundo daquilo em seus Digivices.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">A história, claro, vazou. Em menos de uma hora, Seraphine Kovač já tinha ouvido três versões diferentes no próprio salão de chá, cada uma exagerando um detalhe distinto. Ela própria garantia, entre um gole de chá raro e outro, que cobraria menos para revelar segredos reais da Corporação Tessenrei do que cobrava para apenas <em>mencionar</em> o assunto \"Misha e Hasiel\" para qualquer cliente curioso demais.</p>\n\n    <p class=\"conto\">Foi Rey Lykaios quem decidiu, dias depois, que aquilo precisava de uma intervenção mais... estrutural.</p>\n\n    <p class=\"conto\">— Vocês vão jantar juntos — anunciou ela, entrando na sala de descanso dos instrutores da Academia onde Misha esperava, displicente, por uma reunião sobre patrocínio.</p>\n\n    <p class=\"conto\">— Como é que é?</p>\n\n    <p class=\"conto\">— Reservei uma mesa no restaurante novo do Distrito das Torres. No seu nome. E no nome do Hasiel.</p>\n\n    <p class=\"conto\">— Eu não pedi reserva nenhuma.</p>\n\n    <p class=\"conto\">— Eu sei. Foi um \"erro administrativo\" muito conveniente. — Rey sorriu daquele jeito que avisava qualquer pessoa atenta que algo estava prestes a dar terrivelmente errado, ou terrivelmente certo, dependendo do ponto de vista.</p>\n\n    <p class=\"conto\">Misha considerou recusar. Considerou seriamente. Mas havia, no fundo, uma curiosidade pequena e irritante demais para ignorar — então foi.</p>\n\n    <p class=\"conto\">Hasiel também apareceu, vinte minutos atrasado, descobrindo a reserva da mesma forma estranha e conveniente, e os dois ficaram parados diante da mesa reservada, entendendo, ao mesmo tempo, exatamente o que tinha acontecido.</p>\n\n    <p class=\"conto\">— A Rey — disseram os dois, em unissono, com o mesmo tom exausto.</p>\n\n    <p class=\"conto\">— Ela vai pagar por isso — completou Misha, já puxando a cadeira de qualquer jeito, irritada o bastante para sentar mesmo assim.</p>\n\n    <p class=\"conto\">— Eu não vou nem fingir que estou surpreso — disse Hasiel, sentando-se também, ainda incomodado, mas sem fazer nenhum movimento real para ir embora.</p>\n\n    <p class=\"conto\">E assim ficaram: discutindo, durante o jantar inteiro, sobre quem tinha sido mais ingênuo em cair — ou quase cair — na armadilha elaborada de Rey, sem nunca, nem por um segundo, discutir qualquer outra coisa que de fato importasse entre eles. O garçom, sem entender muito bem a dinâmica, trouxe e levou pratos inteiros sem que nenhum dos dois parasse de falar sobre Rey o suficiente para realmente comer.</p>\n\n    <p class=\"conto\">No dia seguinte, Anduin resumiu o assunto de um jeito que o resto do grupo repetiria por semanas:</p>\n\n    <p class=\"conto\">— Alguém que conhece tão bem o padrão de jogo dela quanto ele conhece, e que mesmo assim nunca aceita um duelo de verdade... não está com medo de perder. Está com medo de outra coisa.</p>\n\n    <p class=\"conto\">Hikaru concordou — mas jurou nunca repetir aquilo na frente de nenhum dos dois. Cazeaje, fiel à amizade antiga, apenas sorriu quando o assunto surgiu e mudou de tema, o que, para quem a conhecia, era praticamente uma confissão.</p>\n\n    <p class=\"conto\">Rey, satisfeita com o \"sucesso parcial\" da própria armadilha, já estava planejando a próxima.</p>", "povo-academia": "<div class=\"chapter-tag\">\n      <div class=\"chapter-num\">13</div>\n      <div class=\"chapter-year\">SALÃO PRINCIPAL DA ACADEMIA DE TREINADORES</div>\n    </div>\n    <span class=\"conto-tag\">⌬ Conto · Academia de Treinadores</span>\n    <h2>Risco Calculado</h2>\n    <p class=\"chapter-dek\">Rey Lykaios lidera a Academia com a leveza de quem está sempre brincando. Anduin Williams é, talvez, a única pessoa de Nexopolis que sabe o tamanho do cálculo escondido atrás de cada pegadinha dela.</p>\n\n    <p class=\"conto\">O Campo de Provas da Academia estava vazio àquela hora — vazio o bastante para que o som de três Digimon diferentes treinando em sincronia ecoasse pelas paredes de dados cristalizados como se fosse uma orquestra desafinada de propósito. Alphamon Ouryuken bloqueava, Chaosmon: Valdur Arm atacava em ângulo, e Susanoomon observava de longe, esperando a abertura certa — exatamente como Anduin havia planejado.</p>\n\n    <p class=\"conto\">— Isso não é uma avaliação oficial — disse uma voz atrás dele, displicente.</p>\n\n    <p class=\"conto\">Anduin não se virou. Já reconhecia o som dos passos de Rey antes mesmo de ela terminar a frase.</p>\n\n    <p class=\"conto\">— Eu não falei que era.</p>\n\n    <p class=\"conto\">— Mas eu vim aqui pra avaliar — continuou ela, se sentando na borda do Campo, observando o treino com a atenção fingida de quem queria parecer apenas curiosa. — Teste oficial de prontidão da Academia.</p>\n\n    <p class=\"conto\">— Seu \"teste oficial\" tem exatamente a mesma estrutura da brincadeira que você tentou comigo semana passada. Só trocou o nome.</p>\n\n    <p class=\"conto\">Rey ficou quieta um segundo — segundo demais para alguém que normalmente tinha resposta pra tudo.</p>\n\n    <p class=\"conto\">— ...Você presta atenção demais.</p>\n\n    <p class=\"conto\">— Eu costumava ler padrão de combate pra ganhar campeonato mundial de Gloria. Você acha mesmo que eu não ia notar quando alguém aplica a mesma pegadinha duas vezes?</p>\n\n    <p class=\"conto\">— A primeira vez foi sobre o cronograma de provas. Essa é sobre treino físico. São pegadinhas <em>diferentes</em>.</p>\n\n    <p class=\"conto\">— São a mesma estrutura com roupa diferente. — Anduin finalmente parou, baixando o braço, deixando os três parceiros relaxarem a postura de combate. — Você sempre cria uma desculpa \"oficial\" pra vir aqui de manhã. Por quê?</p>\n\n    <p class=\"conto\">A pergunta pegou Rey de surpresa — não porque fosse difícil, mas porque era direta demais, do tipo que ela mesma evitava fazer aos outros justamente para não precisar responder quando alguém fizesse de volta.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">Ezra Vantenh observava tudo isso da sombra de um pilar próximo — porque era, basicamente, onde Ezra observava tudo na Academia. Ninguém lembrava exatamente quando ele tinha se matriculado, e ninguém jamais o via em sala de aula, mas ali estava ele, sempre, discreto o suficiente para ser esquecido e atento o suficiente para nunca perder nada importante.</p>\n\n    <p class=\"conto\">— Você devia parar de fingir que não percebe — comentou ele, mais tarde, quando Rey passou perto dele saindo do Campo, ainda processando a pergunta de Anduin.</p>\n\n    <p class=\"conto\">— Percebe o quê?</p>\n\n    <p class=\"conto\">— Que ele é o único nos arredores que te trata como você realmente é, em vez do que você finge ser. Todo mundo vê a treinadora espirituosa cercada de instrutores. Ele vê o resto.</p>\n\n    <p class=\"conto\">Rey abriu a boca para discordar, mas nada saiu. Ezra, satisfeito com o silêncio que conseguira provocar, voltou a se recostar no pilar, como se nunca tivesse dito nada.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">No dia seguinte, Rey tentou de novo — porque Rey sempre tentava de novo, era praticamente uma questão de honra. Esperou Anduin terminar o treino matinal, dessa vez se aproximando sem nenhuma desculpa oficial, sem nenhuma \"avaliação\" disfarçada.</p>\n\n    <p class=\"conto\">— Eu vim aqui porque eu quis — disse ela, antes que ele perguntasse. — Sem desculpa, sem teste oficial.</p>\n\n    <p class=\"conto\">Anduin ergueu uma sobrancelha, surpreso o suficiente para deixar isso transparecer.</p>\n\n    <p class=\"conto\">— Isso é nova pra você.</p>\n\n    <p class=\"conto\">— É a primeira vez que eu tento. — Rey se sentou na mesma borda de sempre, mas dessa vez sem fingir distração. — Eu acho que você tem razão sobre a estrutura repetida. Eu inventava desculpa porque... era mais fácil do que admitir que eu simplesmente queria vir.</p>\n\n    <p class=\"conto\">Houve um silêncio — não desconfortável, apenas o tipo de silêncio que acontece quando duas pessoas decidem, ao mesmo tempo, parar de fingir.</p>\n\n    <p class=\"conto\">— Toko comentou outro dia que eu nunca preciso te chamar pra nada — disse Rey, finalmente, olhando para os Digimon de Anduin descansando ao longe. — Que você simplesmente já está aqui antes de eu perceber que precisava.</p>\n\n    <p class=\"conto\">— Toko fala demais com os alunos novos.</p>\n\n    <p class=\"conto\">— Toko está certo, às vezes.</p>\n\n    <p class=\"conto\">Anduin não respondeu de imediato. Em vez disso, se sentou ao lado dela na borda do Campo, os três parceiros Digimon recolhendo-se a uma distância respeitosa, como se soubessem, instintivamente, que aquele não era um momento para interrupção.</p>\n\n    <p class=\"conto\">— Eu prestava atenção em padrão de jogo pra ganhar partida — disse ele, finalmente, a voz mais baixa do que de costume. — Isso aqui não é padrão de jogo nenhum. Eu só... gosto de estar perto.</p>\n\n    <p class=\"conto\">— Isso é quase uma confissão, Williams.</p>\n\n    <p class=\"conto\">— Chama do que quiser.</p>\n\n    <p class=\"conto\">Rey sorriu — um sorriso diferente dos de sempre, sem a armadilha escondida atrás, sem o cálculo de quem está montando a próxima pegadinha. Só um sorriso comum, de quem, por uma vez, não estava pensando dois passos adiante.</p>\n\n    <p class=\"conto\">— Risco calculado — disse ela, baixinho, mais para si mesma.</p>\n\n    <p class=\"conto\">— O quê?</p>\n\n    <p class=\"conto\">— Nada. Coisa minha.</p>\n\n    <p class=\"conto\">E, pela primeira vez em muito tempo, nenhum dos dois sentiu necessidade de complicar aquilo com mais uma armadilha, mais um teste, mais uma desculpa oficial. Só ficaram ali, sentados, enquanto o sol da manhã batia sobre o Campo de Provas vazio.</p>", "povo-escudo": "<div class=\"chapter-tag\">\n      <div class=\"chapter-num\">14</div>\n      <div class=\"chapter-year\">PÁTIO INDUSTRIAL ABANDONADO · NOITE</div>\n    </div>\n    <span class=\"conto-tag\">⌬ Conto · Esgotos Profundos & Torres Altas</span>\n    <h2>O Peso do Lenço Vermelho</h2>\n    <p class=\"chapter-dek\">Nem toda história relevante de Nexopolis precisa de um DigiRider famoso no centro dela. Algumas das mais importantes acontecem inteiramente entre quem a cidade prefere não enxergar.</p>\n\n    <p class=\"conto\">O alarme não veio da Guarda de Rede. Veio de um contato anônimo nos Esgotos Profundos — alguém que pagara Mireille \"Cordas\" Vasseur para levar a notícia o mais rápido possível, antes que fosse tarde demais: uma onda de Digimon corrompidos, maior do que qualquer coisa registrada nos últimos meses, avançava pelos túneis de manutenção em direção às rotas comerciais que cruzavam o território dos Cães de Trilho e da Rota Negra ao mesmo tempo.</p>\n\n    <p class=\"conto\">Rashida Okonkwo recebeu a notícia primeiro, no meio de uma corrida noturna pelos túneis sob a cidade. Parou o Trailmon modificado com um puxão brusco no controle, o lenço vermelho voando para frente com o impulso.</p>\n\n    <p class=\"conto\">— Quanto tempo até alcançar a Avenida Periférica? — perguntou ao informante, que mal conseguia recuperar o fôlego.</p>\n\n    <p class=\"conto\">— Talvez uma hora. Talvez menos.</p>\n\n    <p class=\"conto\">A Avenida Periférica era território de Soren Lindqvist. Território rival. Território que, em qualquer outra noite, Rashida jamais pisaria sem esperar problema.</p>\n\n    <p class=\"conto\">Mas uma onda daquele tamanho não respeitava fronteira de gangue nenhuma.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">Soren já estava lá quando Rashida chegou, parado na entrada do antigo posto de recarga abandonado, observando os primeiros sinais de corrupção de dados rasgarem o horizonte digital ao longe — pequenas fissuras de cor errada se espalhando pelo chão como veias infectadas.</p>\n\n    <p class=\"conto\">— Você está no meu território — disse ele, sem se virar, quando o som do Trailmon de Rashida ficou alto demais para ignorar.</p>\n\n    <p class=\"conto\">— Eu sei. — Ela parou ao lado dele, descendo do veículo sem pressa, observando a mesma fissura crescer. — Isso não muda nada entre nós depois que acabar.</p>\n\n    <p class=\"conto\">— Eu sei. — Soren finalmente se virou, e havia, em seu rosto normalmente impassível, algo parecido com reconhecimento cansado. — Mas um Digimon corrompido não lê acordo de rota.</p>\n\n    <p class=\"conto\">— Resolve isso primeiro, discute depois — completou Rashida, ajustando o lenço vermelho.</p>\n\n    <p class=\"conto\">Foi o mais perto que os dois jamais estiveram de concordar voluntariamente em alguma coisa.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">A trégua, ainda que nunca formalizada em palavras além daquelas poucas trocadas no posto abandonado, se transformou rapidamente em coordenação real. Os Cães de Trilho bloquearam as rotas subterrâneas pelas quais a onda corrompida poderia se espalhar para os bairros residenciais; a Rota Negra cobriu as estradas periféricas, contendo o avanço pelo lado de fora.</p>\n\n    <p class=\"conto\">No meio do caos, surgiu uma terceira figura — sozinha, como sempre trabalhava, contratada por um intermediário anônimo dos Esgotos Profundos havia poucas horas. Velka Ostrenko não precisava de apresentação para quem já tinha visto seu trabalho antes: ela simplesmente aparecia onde a anomalia era mais densa, sorrindo daquele jeito que mais assustava do que tranquilizava, e fazia o que fazia melhor.</p>\n\n    <p class=\"conto\">— Vocês dois trabalhando juntos — comentou ela, passando entre Rashida e Soren sem realmente parar, os olhos fixos na fissura mais próxima. — Isso é novo.</p>\n\n    <p class=\"conto\">— Não é trabalho junto — rosnou Soren. — É coincidência de prioridade.</p>\n\n    <p class=\"conto\">— Chama do que quiser — disse Velka, já avançando para o centro da anomalia, onde a corrupção de dados pulsava mais intensamente. — Só não se metam no meu caminho enquanto eu termino.</p>\n\n    <p class=\"conto\">Levou quase três horas. Velka isolou e neutralizou o núcleo da anomalia, processo que nenhum dos dois líderes de gangue jamais perguntou como funcionava exatamente — e ela jamais ofereceu explicar. Quando terminou, a fissura havia se fechado, as rotas estavam livres, e os bairros residenciais nunca chegaram a saber o quão perto estiveram de uma noite muito pior.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">Murk, o predador que decidira sozinho que os Esgotos Profundos eram território dele, observou tudo de longe, das sombras mais distantes dos túneis, sem nunca se aproximar. Não por medo — Murk não temia muita coisa — mas porque, mesmo para ele, havia algo sobre ver Rashida, Soren e Velka cooperando que parecia errado o bastante para manter distância.</p>\n\n    <p class=\"conto\">Quando a poeira baixou, Soren e Rashida se encontraram de novo, dessa vez sem urgência nenhuma os unindo.</p>\n\n    <p class=\"conto\">— Isso não muda nada — repetiu Soren, a voz mais firme agora que a adrenalina tinha passado.</p>\n\n    <p class=\"conto\">— Eu disse que sabia. — Rashida subiu de volta no Trailmon, ajustando o lenço vermelho uma última vez. — Mas pelo menos agora sabemos que, se a cidade realmente precisar, a gente aparece.</p>\n\n    <p class=\"conto\">Soren não respondeu. Mas, também, não discordou.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">A notícia, claro, chegou até Talia Ferro antes do amanhecer — quase tudo que envolvia ameaça ao Nexus-0 chegava até ela, de um jeito ou de outro, desde o dia em que o Colapso de Dados lhe dera a cicatriz que carregava no rosto e no pescoço. No Abrigo de Sobreviventes erguido no antigo Setor Colapsado, ela ouviu o relato completo de um dos próprios sobreviventes que tinha testemunhado de longe, e ficou em silêncio por mais tempo do que o normal.</p>\n\n    <p class=\"conto\">— Eles cooperaram — disse o sobrevivente, ainda incrédulo. — Os Cães de Trilho e a Rota Negra. Cooperaram de verdade.</p>\n\n    <p class=\"conto\">— Isso é o que o Escudo Susanoomon deveria representar — murmurou Talia, mais para si mesma. — Gente disposta a chegar antes de qualquer outra, quando o Nexus-0 volta a tremer. Não importa de que lado da rivalidade você está.</p>\n\n    <p class=\"conto\">Tarvik, sentado no canto de sempre da Taverna do Beco Cinza quando a notícia circulou entre os clientes da noite, ergueu a garrafa num gesto que era quase um brinde, quase uma confissão.</p>\n\n    <p class=\"conto\">— Talvez eu assine aquele compromisso formal da Talia, um dia — murmurou, mais para a bebida do que para qualquer pessoa ali. — Um dia desses.</p>\n\n    <p class=\"conto\">Ninguém apostou que seria em breve. Mas, em Nexopolis, \"um dia desses\" às vezes era tudo que se podia esperar — e, para quem vivia nas margens da cidade, isso já era mais do que a maioria conseguia oferecer.</p>", "povo-fragmentos": "<div class=\"chapter-tag\">\n      <div class=\"chapter-num\">15</div>\n      <div class=\"chapter-year\">UMA NOITE, A CIDADE INTEIRA</div>\n    </div>\n    <span class=\"conto-tag\">⌬ Conto · Nexopolis, de ponta a ponta</span>\n    <h2>A Noite em Que Ninguém Dormiu</h2>\n    <p class=\"chapter-dek\">Nem toda história precisa de um centro. Algumas são feitas de fragmentos pequenos acontecendo ao mesmo tempo — e ainda assim dizem muito sobre o tamanho real da cidade.</p>\n\n    <p class=\"conto\">Joaquín Bravante jurava, sempre que alguém perguntava depois, que nunca tivera intenção de colocar aquilo no ar. Estava ajustando o transmissor pirata no Beco das Antenas, testando frequência, quando captou — por puro acidente, segundo ele insistia — alguns segundos de uma discussão entre Misha e Hasiel perto do Mercado Central. O suficiente para que a frase \"coisas melhores que isso eu duvido que você tenha\" fosse ao ar antes que ele conseguisse cortar o sinal.</p>\n\n    <p class=\"conto\">— Não foi de propósito — repetiu Joaquín, pela enésima vez, para um ouvinte qualquer que ligou reclamando. — Eu juro. Foi acidente.</p>\n\n    <p class=\"conto\">Ninguém acreditou completamente. Mas, em menos de uma hora, metade de Nexopolis já repetia a frase como piada interna, e Joaquín continuava sendo, de longe, o DJ mais ouvido da frequência não-oficial da cidade — então o assunto nunca chegou a virar problema de verdade.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">No Reservatório de Dados, do outro lado da cidade, Náiad Cortez ouviu passos se aproximando da beira da água depois de um turno particularmente silencioso. Ergueu os olhos só o suficiente para reconhecer Hikaru, sozinho, sentado na borda, instrumento nas mãos, ainda carregando nos ombros o peso visível de uma missão difícil mais cedo naquela noite — um Digimon de Água que quase não aceitara se calmar.</p>\n\n    <p class=\"conto\">Ele começou a tocar — baixo, quase um murmúrio de melodia, nada parecido com as composições alegres que normalmente usava nas praças públicas.</p>\n\n    <p class=\"conto\">Náiad não disse nada. Apenas ficou ali, junto da água, até a música parar.</p>\n\n    <p class=\"conto\">— Não era pra calmar Digimon nenhum, essa — disse Hikaru, por fim, guardando o instrumento.</p>\n\n    <p class=\"conto\">— Eu sei — respondeu ela, simplesmente. E foi só isso. Não precisava de mais.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">Na Clínica Pública, Faelan Brightwell suturava — pela terceira vez naquele mês — um corte que Anduin insistia ser \"nada grave\", apesar da evidência visível em sentido contrário.</p>\n\n    <p class=\"conto\">— Você é o pior paciente desse grupo inteiro — comentou Faelan, sem erguer os olhos do trabalho, os olhos heterocromáticos brilhando sob a luz da sala de emergência. — Sabia disso?</p>\n\n    <p class=\"conto\">— A Misha é pior.</p>\n\n    <p class=\"conto\">— A Misha segue cada instrução que eu dou à risca. Uma idol não pode se apresentar com o braço quebrado, então ela realmente se cuida. Você finge que tá tudo bem pra voltar mais rápido pro treino.</p>\n\n    <p class=\"conto\">Anduin não teve resposta boa para aquilo, então só deixou Faelan terminar o trabalho em silêncio.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">No Bar Engrenagem, no Distrito Industrial, Holger \"Braço de Lata\" Brenner serviu uma bebida que ninguém pedira — porque ninguém precisava pedir, quando a pessoa sentada sozinha no balcão era Cazeaje, depois de um turno longo demais no Posto de Missões.</p>\n\n    <p class=\"conto\">— Eu não pedi isso — disse ela, ainda assim aceitando o copo.</p>\n\n    <p class=\"conto\">— Eu sei. — Holger limpou outro copo, sem se alongar no assunto. — Você cuida de todo mundo que chega em Nexopolis sem saber de nada. Alguém tem que cuidar de você de vez em quando.</p>\n\n    <p class=\"conto\">Cazeaje sorriu — cansada, mas sincera — e bebeu em silêncio, enquanto o bar seguia seu murmúrio noturno de costume ao redor.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">Na Arena de Gladiadores, Grendrek recusava, pela enésima vez, uma aposta que um cliente insistia em fazer.</p>\n\n    <p class=\"conto\">— Eu não aceito essa — disse ele, cruzando os braços. — Aposta em quando a Misha e o Hasiel vão admitir o que está acontecendo entre eles não é jogo de azar. É certeza disfarçada de mistério. Eu não cobro dinheiro fácil assim.</p>\n\n    <p class=\"conto\">Kirsen Volkhart, parado ao lado, observando o treino noturno de Aurigan, concordou sem hesitar.</p>\n\n    <p class=\"conto\">— Já vi duelo mais imprevisível dentro do próprio tablado de combate.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">E nos telhados acima do Mercado Central, Kaito Reyne observava, mais uma vez, sem sucesso, tentando localizar onde Hasiel guardava o estoque de cartas que vendia. Tinha tentado seguir, vigiar, até subornar Yusuf Akdemir por qualquer fragmento de informação. No fim, a única certeza que tinha era incômoda: Cazeaje sabia a resposta. E jamais venderia aquilo por preço nenhum — porque, para ela, aquilo nunca estivera em jogo.</p>\n\n    <p class=\"conto\">— Um dia eu descubro — murmurou Kaito para si mesmo, observando as luzes de Nexopolis se espalharem abaixo dele.</p>\n\n    <p class=\"conto\">Era o tipo de promessa que ele fazia a si mesmo havia meses. Nenhuma vez, até agora, tinha se cumprido.</p>\n\n    <div class=\"scene-break\">⌬ ⌬ ⌬</div>\n\n    <p class=\"conto\">São fragmentos pequenos, quase irrelevantes sozinhos. Mas, juntos, numa única noite, formam o retrato mais honesto que existe de Nexopolis: uma cidade enorme, cheia de gente que segue vivendo suas próprias histórias enquanto seis nomes continuam, sem querer, virando lenda ao redor dela.</p>\n\n    <p class=\"conto\">E Datahaven é grande o bastante para guardar muito mais do que isso. Cada banca do Mercado Central, cada turno na Clínica Pública, cada noite na Taverna do Beco Cinza esconde uma história que ainda não foi registrada em arquivo nenhum. Talvez a próxima expedição encontre essas histórias. Talvez elas continuem soltas, contadas de boca em boca, do jeito que histórias de gente comum sempre foram contadas — muito antes de qualquer Limiar, qualquer Nexus-0, qualquer Digimon existir para ouvir.</p>"};

const ENTRIES = [
  { id:"origem",           num:0,  folder:"registro", year:"2022 · O LIMIAR",                       title:"O Começo de Tudo",                     dek:"Antes de existir um nome para o que estava nascendo, existiam apenas dados, mais dados do que qualquer sistema fora projetado para conter.", conto:false },
  { id:"cap1",             num:1,  folder:"registro", year:"PRIMEIROS ANOS DO CONTATO",             title:"O Primeiro Contato",                   dek:"Conhecimento sem experiência: os Digimon sabiam tudo sobre a humanidade, exceto como era conversar com ela.", conto:false },
  { id:"cap3",             num:3,  folder:"registro", year:"UM TORNEIO QUALQUER NA CYBEREDE",       title:"Energia de Fusão",                     dek:"A barreira entre humano e Digimon, que todos acreditavam absoluta, desapareceu num único instante.", conto:false },
  { id:"cap4",             num:4,  folder:"registro", year:"2030 · UMA DÉCADA DEPOIS",             title:"A Era DigiRider",                      dek:"O período mais pacífico já vivido pela civilização humana — e os primeiros sinais de que algo não estava certo.", conto:false },
  { id:"cap5",             num:5,  folder:"registro", year:"DESDE ANTES DA PRIMEIRA CIDADE DIGITAL",title:"Os Guardiões",                         dek:"Algumas perguntas sobre o Nexus-0 nunca tiveram resposta científica. Apenas dois nomes.", conto:false },
  { id:"cap6",             num:6,  folder:"registro", year:"EXPANSÃO DE DATAHAVEN",                title:"Trailmon",                             dek:"Os trilhos que conectam Datahaven são mais antigos do que a própria CybeRede.", conto:false },
  { id:"cap8",             num:7,  folder:"registro", year:"DOSSIÊ RESTRITO · VANGUARDA YGGDRASIL",title:"Digievolução, o Colapso e o Programa Evo", dek:"A história oficial diz que o Nexus-0 nasceu de um crescimento lento. Há quem tenha provas de que nasceu de uma única noite em que algo quebrou.", conto:false },
  { id:"cap7",             num:8,  folder:"registro", year:"2042 · VINTE ANOS DEPOIS DO LIMIAR",   title:"Nexopolis",                            dek:"Nenhuma cidade no Nexus-0 cresceu tão rápido quanto Nexopolis, e nenhuma escondeu tão bem o preço desse crescimento.", conto:false },
  { id:"povo-intro",       num:9,  folder:"povo",     year:"2042 · REGISTROS INFORMAIS",           title:"Histórias do Povo",                    dek:"Os arquivos oficiais registram facções, colapsos e tratados. Mas Datahaven também é feita do que acontece entre uma missão e outra.", conto:false },
  { id:"povo-seis",        num:10, folder:"povo",     year:"NOMES QUE SE REPETEM NOS RELATÓRIOS",  title:"Os Seis de Nexopolis",                 dek:"Ninguém os nomeou formalmente como grupo. A Guarda de Rede simplesmente parou de se surpreender.", conto:false },
  { id:"povo-hamburgueres",num:11, folder:"povo",     year:"QUALQUER LANCHONETE DE NEXOPOLIS",     title:"Hambúrgueres e Segredos",              dek:"A lenda urbana mais fácil de confirmar em toda Datahaven: procure por uma montanha de hambúrgueres digitais.", conto:true, conto_tag:"⌬ Conto · Mercado Central" },
  { id:"povo-duelo",       num:12, folder:"povo",     year:"TEATRO DE CRISTAL · UMA NOITE QUALQUER",title:"A Aposta Que Ninguém Venceu",         dek:"Todo mundo em Nexopolis tem uma teoria sobre Misha Eriza e Hasiel. Nenhuma delas foi confirmada.", conto:true, conto_tag:"⌬ Conto · Torres Altas" },
  { id:"povo-academia",    num:13, folder:"povo",     year:"ACADEMIA DE TREINADORES",              title:"Risco Calculado",                      dek:"Rey Lykaios lidera a Academia com a leveza de quem está sempre brincando.", conto:true, conto_tag:"⌬ Conto · Academia de Treinadores" },
  { id:"povo-escudo",      num:14, folder:"povo",     year:"PÁTIO INDUSTRIAL · NOITE",             title:"O Peso do Lenço Vermelho",             dek:"Nem toda história relevante de Nexopolis precisa de um DigiRider famoso no centro dela.", conto:true, conto_tag:"⌬ Conto · Esgotos Profundos" },
  { id:"povo-fragmentos",  num:15, folder:"povo",     year:"UMA NOITE, A CIDADE INTEIRA",          title:"A Noite em Que Ninguém Dormiu",        dek:"Nem toda história precisa de um centro. Algumas são feitas de fragmentos pequenos acontecendo ao mesmo tempo.", conto:true, conto_tag:"⌬ Conto · Nexopolis" },
];

const FOLDERS = [
  { key:"registro", label:"Registros Históricos", icon:"📂" },
  { key:"povo",     label:"Histórias do Povo",    icon:"📂" },
];

/* ─── STATE ─── */
let activeId = null;
let activeFilter = "all";
let searchQuery = "";
let openFolders = new Set(["registro","povo"]); // start both open

/* ─── RENDER SIDEBAR ─── */
function renderSidebar() {
  const list = document.getElementById('folder-list');
  list.innerHTML = '';

  const q = searchQuery.toLowerCase();

  let visibleCount = 0;

  for (const folder of FOLDERS) {
    const entries = ENTRIES.filter(e => {
      if (e.folder !== folder.key) return false;
      if (activeFilter === 'registro' && e.conto) return false;
      if (activeFilter === 'conto' && !e.conto) return false;
      if (q) {
        return e.title.toLowerCase().includes(q) || e.dek.toLowerCase().includes(q) || e.year.toLowerCase().includes(q);
      }
      return true;
    });

    if (entries.length === 0 && q) continue;
    visibleCount += entries.length;

    const folderDiv = document.createElement('div');
    folderDiv.className = 'folder';

    const toggle = document.createElement('button');
    toggle.className = 'folder-toggle' + (openFolders.has(folder.key) ? ' open' : '');
    toggle.innerHTML = `
      <span class="folder-icon-arrow">${openFolders.has(folder.key) ? '▾' : '▸'}</span>
      <span class="folder-icon">${folder.icon}</span>
      <span class="folder-name">${folder.label}</span>
      <span class="folder-badge${folder.key==='povo'?' conto':''}">${entries.length}</span>
    `;
    toggle.addEventListener('click', () => {
      if (openFolders.has(folder.key)) openFolders.delete(folder.key);
      else openFolders.add(folder.key);
      renderSidebar();
    });

    const contents = document.createElement('div');
    contents.className = 'folder-contents' + (openFolders.has(folder.key) ? ' open' : '');

    for (const entry of entries) {
      const item = document.createElement('div');
      item.className = 'file-item' + (entry.id === activeId ? ' active' : '');
      item.dataset.id = entry.id;

      const titleDisplay = q ? entry.title.replace(new RegExp(`(${escapeRegex(q)})`, 'gi'), '<mark class="highlight">$1</mark>') : entry.title;

      item.innerHTML = `
        <div class="file-num${entry.conto?' conto':''}">${entry.num}</div>
        <div class="file-info">
          <div class="file-title">${titleDisplay}</div>
          <div class="file-sub">${entry.year}</div>
        </div>
      `;
      item.addEventListener('click', () => openEntry(entry.id));
      contents.appendChild(item);
    }

    if (entries.length === 0 && !q) {
      contents.innerHTML = '<div class="no-results">Nenhum arquivo nesta pasta</div>';
    }

    folderDiv.appendChild(toggle);
    folderDiv.appendChild(contents);
    list.appendChild(folderDiv);
  }

  // Search: no folder grouping, flat list
  if (q && visibleCount === 0) {
    list.innerHTML = '<div class="no-results">Nenhum arquivo encontrado</div>';
  }

  document.getElementById('count-label').textContent = visibleCount + ' arquivo' + (visibleCount !== 1 ? 's' : '');
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* ─── OPEN ENTRY ─── */
function openEntry(id) {
  const entry = ENTRIES.find(e => e.id === id);
  if (!entry) return;

  activeId = id;
  renderSidebar();

  // Update breadcrumb
  const folderLabel = FOLDERS.find(f => f.key === entry.folder)?.label || '';
  document.getElementById('breadcrumb').innerHTML = `
    <span>DATAHAVEN</span>
    <span class="sep">/</span>
    <span>${folderLabel.toUpperCase()}</span>
    <span class="sep">/</span>
    <span class="active">${entry.title.toUpperCase()}</span>
  `;

  // Show article
  document.getElementById('welcome-screen').style.display = 'none';
  const wrap = document.getElementById('article-wrap');
  wrap.classList.add('visible');

  document.getElementById('article-label').textContent = entry.title;

  // Build content
  const body = document.getElementById('article-body');
  const sectionHTML = SECTIONS_HTML[id] || '';
  
  // Build nav buttons
  const idx = ENTRIES.indexOf(entry);
  const prev = idx > 0 ? ENTRIES[idx - 1] : null;
  const next = idx < ENTRIES.length - 1 ? ENTRIES[idx + 1] : null;
  
  let navHTML = '<div class="article-nav">';
  if (prev) navHTML += `<button class="article-nav-btn" onclick="openEntry('${prev.id}')"><span class="nav-dir">◂ Anterior</span><span class="nav-title">${prev.title}</span></button>`;
  else navHTML += '<div></div>';
  if (next) navHTML += `<button class="article-nav-btn next" onclick="openEntry('${next.id}')"><span class="nav-dir">Próximo ▸</span><span class="nav-title">${next.title}</span></button>`;
  navHTML += '</div>';

  body.innerHTML = sectionHTML + navHTML;

  // Scroll reader to top
  const reader = document.getElementById('reader');
  reader.scrollTop = 0;

  // Progress bar
  const progressBar = document.getElementById('progress-bar');
  reader.onscroll = () => {
    const pct = reader.scrollTop / (reader.scrollHeight - reader.clientHeight) * 100;
    progressBar.style.width = Math.min(100, pct) + '%';
  };
}

/* ─── BACK BUTTON ─── */
document.getElementById('back-btn').addEventListener('click', () => {
  activeId = null;
  document.getElementById('welcome-screen').style.display = '';
  document.getElementById('article-wrap').classList.remove('visible');
  document.getElementById('breadcrumb').innerHTML = `<span>DATAHAVEN</span><span class="sep">/</span><span>REGISTROS</span>`;
  document.getElementById('progress-bar').style.width = '0%';
  renderSidebar();
});

/* ─── FILTER BUTTONS ─── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderSidebar();
  });
});

/* ─── SEARCH ─── */
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  if (searchQuery) openFolders = new Set(["registro","povo"]);
  renderSidebar();
});

/* ─── INIT ─── */
renderSidebar();
</script>
</body>
</html>
